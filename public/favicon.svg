<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="65%" r="40%">
      <stop offset="0%" stop-color="#e8d44d"/>
      <stop offset="60%" stop-color="#b8a030"/>
      <stop offset="100%" stop-color="#6b6b2a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <circle cx="16" cy="16" r="15" fill="#1a1a14"/>
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#4a5a3a" stroke-width="0.5"/>
  <!-- Glow behind abdomen -->
  <circle cx="16" cy="19" r="8" fill="url(#glow)" opacity="0.6"/>
  <!-- Wings -->
  <ellipse cx="11" cy="12" rx="4.5" ry="2.5" fill="#5a6a4a" opacity="0.5" transform="rotate(-20 11 12)"/>
  <ellipse cx="21" cy="12" rx="4.5" ry="2.5" fill="#5a6a4a" opacity="0.5" transform="rotate(20 21 12)"/>
  <!-- Body -->
  <ellipse cx="16" cy="14" rx="2.2" ry="3" fill="#3a3a2a"/>
  <!-- Glowing abdomen -->
  <ellipse cx="16" cy="19" rx="2.8" ry="3.5" fill="#c8b840"/>
  <ellipse cx="16" cy="18.5" rx="1.8" ry="2.5" fill="#e8d44d" opacity="0.7"/>
  <!-- Head -->
  <circle cx="16" cy="10.5" r="1.8" fill="#3a3a2a"/>
  <!-- Antennae -->
  <line x1="15" y1="9" x2="12.5" y2="5.5" stroke="#5a6a4a" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="17" y1="9" x2="19.5" y2="5.5" stroke="#5a6a4a" stroke-width="0.7" stroke-linecap="round"/>
  <circle cx="12.5" cy="5.5" r="0.6" fill="#7a8a5a"/>
  <circle cx="19.5" cy="5.5" r="0.6" fill="#7a8a5a"/>
</svg>
